services:
  mysql:
    image: mysql:8.0
    container_name: adminprov_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - adminprov_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: adminprov_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 4000
      APP_BASE_URL: ${APP_BASE_URL}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY}
      DOCUSIGN_USER_ID: ${DOCUSIGN_USER_ID}
      DOCUSIGN_ACCOUNT_ID: ${DOCUSIGN_ACCOUNT_ID}
      DOCUSIGN_BASE_URI: ${DOCUSIGN_BASE_URI}
      DOCUSIGN_AUTH_SERVER: ${DOCUSIGN_AUTH_SERVER}
      DOCUSIGN_PRIVATE_KEY_PATH: ${DOCUSIGN_PRIVATE_KEY_PATH}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - adminprov_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: adminprov_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - adminprov_net

volumes:
  mysql_data:

networks:
  adminprov_net:
    driver: bridge
